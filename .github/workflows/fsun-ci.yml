name: fsun-ci

# Lean, deterministic gate for the fsun_config personal layer
# (myclaude / ecc.js / manifest / custom rules).
#
# Deliberately does NOT run the full upstream `node tests/run-all.js`:
# that suite is owned by upstream's ci.yml (which still runs here, advisory),
# and it carries pre-existing/flaky failures (e.g. trae-install ETIMEDOUT)
# unrelated to this personal layer. Keeping them out of the REQUIRED gate
# is what makes "merges only when green" actually hold.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: fsun-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  fsun-ci:
    name: fsun-ci
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js 20
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 20.x

      - name: Shell syntax — myclaude
        run: bash -n fsun_config/myclaude

      - name: JS syntax — ecc.js
        run: node --check fsun_config/ecc.js

      - name: manifest.json is valid JSON
        run: node -e "JSON.parse(require('fs').readFileSync('fsun_config/manifest.json','utf8'))"

      - name: Manifest source integrity (every tracked path exists at its source)
        run: |
          node -e '
            const fs = require("fs"), p = require("path");
            const m = JSON.parse(fs.readFileSync("fsun_config/manifest.json", "utf8"));
            const bad = [];
            for (const f of m.upstream || []) if (!fs.existsSync(f)) bad.push("upstream: " + f);
            for (const f of m.custom || []) if (!fs.existsSync(p.join("fsun_config/custom", f))) bad.push("custom: " + f);
            // bible[] sources live in ~/claude-bible (not in repo) — not checkable in CI; skip.
            if (bad.length) { console.error("Missing manifest sources:\n" + bad.join("\n")); process.exit(1); }
            console.log("manifest integrity OK: " + (m.upstream||[]).length + " upstream + " + (m.custom||[]).length + " custom sources present (" + (m.bible||[]).length + " bible skipped)");
          '

      - name: Markdownlint — fsun_config docs & custom rules
        # Pinned to the repo's devDependency range (package.json: ^0.48.0)
        # so this gate stays deterministic and reproducible.
        run: npx --yes markdownlint-cli@0.48.0 'fsun_config/**/*.md' --ignore node_modules
