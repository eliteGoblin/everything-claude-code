name: fsun-ci

# Lean, deterministic gate for the fsun_config personal layer
# (myclaude / ecc.js / manifest / custom rules).
#
# Deliberately does NOT run the full upstream `node tests/run-all.js`:
# that suite is owned by upstream's ci.yml (which still runs here, advisory),
# and it carries pre-existing/flaky failures (e.g. trae-install ETIMEDOUT)
# unrelated to this personal layer. Keeping them out of the REQUIRED gate
# is what makes "merges only when green" actually hold.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: fsun-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  fsun-ci:
    name: fsun-ci
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js 20
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 20.x

      - name: Shell syntax — myclaude
        run: bash -n fsun_config/myclaude

      - name: JS syntax — ecc.js
        run: node --check fsun_config/ecc.js

      - name: manifest.json is valid JSON
        run: node -e "JSON.parse(require('fs').readFileSync('fsun_config/manifest.json','utf8'))"

      - name: ecc.js manifest integrity (no missing tracked files)
        run: |
          out="$(node fsun_config/ecc.js status 2>&1)"
          echo "$out"
          echo "$out" | grep -qE '0 missing' || { echo "::error::tracked files missing from manifest source"; exit 1; }

      - name: Markdownlint — fsun_config docs & custom rules
        run: npx --yes markdownlint-cli 'fsun_config/**/*.md' --ignore node_modules
